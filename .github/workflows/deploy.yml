name: deploy

# Portão 3 (ADR-0005) — deploy em produção no merge para main.
# Fluxo: build das imagens web+api -> push para GHCR -> dispara redeploy no
# Coolify (webhook) -> smoke test em epistemix.dev.
#
# O job `deploy` é GUARDADO pela presença do secret COOLIFY_TOKEN: enquanto o
# operador não tiver configurado os apps no Coolify + secrets (ver
# docs/runbooks/0003-deploy-cutover-coolify.md), o build/push roda e o deploy
# é pulado (não falha). Depois do setup, o deploy passa a rodar.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  build-push:
    name: build-push (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [web, api]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/thiagopanini/epistemix-${{ matrix.app }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - uses: docker/build-push-action@v7
        with:
          # web precisa do contexto na raiz para enxergar content/ (catálogo
          # MDX-native lido em build-time, ADR-0018); api segue com contexto
          # próprio. file é relativo ao workspace nos dois casos.
          context: ${{ matrix.app == 'web' && '.' || format('apps/{0}', matrix.app) }}
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: deploy (coolify)
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - id: guard
        run: echo "enabled=${{ secrets.COOLIFY_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

      - name: Trigger Coolify redeploy (web + api)
        if: steps.guard.outputs.enabled == 'true'
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          WEB_UUID: ${{ secrets.COOLIFY_WEB_UUID }}
          API_UUID: ${{ secrets.COOLIFY_API_UUID }}
        run: |
          set -euo pipefail
          for uuid in "$API_UUID" "$WEB_UUID"; do
            echo "Disparando deploy do app $uuid..."
            curl -fsSL -X POST \
              -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
              "${COOLIFY_URL}/api/v1/deploy?uuid=${uuid}&force=true"
          done

      - name: Smoke test (epistemix.dev)
        if: steps.guard.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          echo "Aguardando o deploy estabilizar e checando epistemix.dev..."
          for i in $(seq 1 30); do
            if curl -fsS https://epistemix.dev | grep -q "epistemix"; then
              echo "Smoke OK (tentativa $i)"; exit 0
            fi
            sleep 10
          done
          echo "Smoke test falhou — epistemix.dev não respondeu como esperado"; exit 1

      - name: Deploy pulado (sem secrets do Coolify)
        if: steps.guard.outputs.enabled != 'true'
        run: |
          echo "::notice::COOLIFY_TOKEN ausente — build/push para GHCR feito, deploy pulado."
          echo "::notice::Configure os apps + secrets via docs/runbooks/0003-deploy-cutover-coolify.md"
