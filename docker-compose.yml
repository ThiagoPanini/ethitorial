services:
  web:
    build:
      # Contexto na raiz do monorepo para o build enxergar content/ (ADR-0018).
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      EPISTEMIX_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: epistemix
      POSTGRES_PASSWORD: epistemix
      POSTGRES_DB: epistemix
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epistemix -d epistemix"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
